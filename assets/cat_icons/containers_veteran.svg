<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Контейнер ветерана - синий, усиленный -->
  <path d="M5 9 L5 18 C5 18.5 5.5 19 6 19 L18 19 C18.5 19 19 18.5 19 18 L19 9"
        stroke="#4A90E2" stroke-width="1.4" fill="#4A90E2" fill-opacity="0.12"/>
  <!-- Крышка усиленная -->
  <path d="M4.5 9 L12 5.5 L19.5 9" stroke="#4A90E2" stroke-width="1.4" 
        stroke-linecap="round" stroke-linejoin="round" fill="#4A90E2" fill-opacity="0.18"/>
  <!-- Двойной замок -->
  <rect x="8" y="11.5" width="3" height="2.8" rx="0.4" 
        stroke="#4A90E2" stroke-width="1.2" fill="#4A90E2" fill-opacity="0.35"/>
  <rect x="13" y="11.5" width="3" height="2.8" rx="0.4" 
        stroke="#4A90E2" stroke-width="1.2" fill="#4A90E2" fill-opacity="0.35"/>
  <!-- Ручки усиленные -->
  <path d="M3.5 11.5 L3.5 14.5" stroke="#4A90E2" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M20.5 11.5 L20.5 14.5" stroke="#4A90E2" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Усиление по бокам -->
  <line x1="6.5" y1="10" x2="6.5" y2="17" stroke="#4A90E2" stroke-width="0.9" opacity="0.5"/>
  <line x1="17.5" y1="10" x2="17.5" y2="17" stroke="#4A90E2" stroke-width="0.9" opacity="0.5"/>
  <!-- Медаль ветерана (акцент) -->
  <circle cx="12" cy="3" r="1.8" fill="#4A90E2" opacity="0.7"/>
  <path d="M12 1.8 L12.3 2.5 L13 2.6 L12.5 3.1 L12.6 3.8 L12 3.4 L11.4 3.8 L11.5 3.1 L11 2.6 L11.7 2.5 Z" 
        fill="white" opacity="0.9"/>
</svg>
