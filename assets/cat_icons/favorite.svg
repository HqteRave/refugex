<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Внешняя звезда с 5 лучами - фиолетовое свечение -->
  <path d="M12 2 L14.5 9 L22 9.5 L16.5 14.5 L18 22 L12 18 L6 22 L7.5 14.5 L2 9.5 L9.5 9 Z" 
    stroke="#9B6BFF" stroke-width="1.5" fill="rgba(155,107,255,0.15)" filter="url(#glow)"/>
  <!-- Внутренний блик -->
  <circle cx="12" cy="8" r="1.5" fill="rgba(255,255,255,0.3)"/>
</svg>
