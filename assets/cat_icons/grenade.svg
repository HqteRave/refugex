<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <defs>
    <filter id="glow_g">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Тело гранаты (овал) -->
  <ellipse cx="12" cy="15" rx="6" ry="7" stroke="#D4A017" stroke-width="1.6"
    fill="rgba(212,160,23,0.18)" filter="url(#glow_g)"/>
  <!-- Горизонтальные насечки -->
  <line x1="6.3" y1="13" x2="17.7" y2="13" stroke="#D4A017" stroke-width="0.9" opacity="0.55"/>
  <line x1="6.3" y1="16" x2="17.7" y2="16" stroke="#D4A017" stroke-width="0.9" opacity="0.55"/>
  <!-- Шейка -->
  <rect x="10.5" y="7" width="3" height="2.5" rx="0.4"
    stroke="#D4A017" stroke-width="1.4" fill="rgba(212,160,23,0.25)"/>
  <!-- Рычаг -->
  <line x1="13.5" y1="7.5" x2="16.5" y2="5.5" stroke="#D4A017" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Кольцо чеки -->
  <circle cx="17.5" cy="5" r="1.5" stroke="#D4A017" stroke-width="1.3" fill="none"/>
  <line x1="16" y1="5" x2="13.5" y2="7.5" stroke="#D4A017" stroke-width="1.3" stroke-linecap="round"/>
</svg>