  <circle cx="16" cy="15" r="1.2" fill="#ffffff" opacity="0.4"/>
  
  <circle cx="8" cy="18" r="1.2" fill="#ffffff" opacity="0.4"/>
  <circle cx="12" cy="18" r="1.2" fill="#ffffff" opacity="0.4"/>
