<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <defs>
    <filter id="glow_stash">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Основной контейнер/ящик -->
  <path d="M5 9 L5 19 C5 19.5 5.5 20 6 20 L18 20 C18.5 20 19 19.5 19 19 L19 9"
        stroke="#8B7355" stroke-width="1.6" fill="rgba(139,115,85,0.18)" filter="url(#glow_stash)"/>
  <!-- Крышка -->
  <path d="M4 9 L12 5 L20 9" stroke="#8B7355" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="rgba(139,115,85,0.25)"/>
  <!-- Замок/защёлка -->
  <rect x="10" y="12" width="4" height="3.5" rx="0.5" 
        stroke="#8B7355" stroke-width="1.4" fill="rgba(139,115,85,0.35)" filter="url(#glow_stash)"/>
  <!-- Ручки по бокам -->
  <path d="M4 12 L4 15" stroke="#8B7355" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M20 12 L20 15" stroke="#8B7355" stroke-width="1.4" stroke-linecap="round"/>
</svg>
